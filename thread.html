<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラス掲示板 — スレッド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0f14;
    --surface: #161b25;
    --surface2:#1e2535;
    --border:  #2a3245;
    --accent:  #4f9eff;
    --accent2: #ff6b6b;
    --accent3: #50e3a4;
    --text:    #e8edf5;
    --muted:   #6b7a99;
    --font:    'Zen Kaku Gothic New', sans-serif;
    --mono:    'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Nav ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    transition: opacity .15s;
  }

  .back-btn:hover { opacity: 0.7; }

  .nav-sep { width: 1px; height: 20px; background: var(--border); }

  .nav-thread-title {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .admin-badge {
    display: none;
    font-family: var(--mono);
    font-size: 10px;
    color: #ffbb00;
    border: 1px solid #ffbb00;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  /* ── Main ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 16px 120px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── OP投稿（スレッド本文） ── */
  .op-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeUp .4s ease both;
  }

  .op-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .op-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #7b5fff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .op-meta { flex: 1; }

  .op-title {
    font-size: 18px;
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: -0.5px;
  }

  .op-info {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .op-anon {
    font-size: 12px;
    color: var(--accent);
    font-family: var(--mono);
  }

  .op-time {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .op-own-badge {
    font-size: 10px;
    background: rgba(80,227,164,0.15);
    color: var(--accent3);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    display: none;
  }

  .op-body {
    padding: 16px 20px;
  }

  .op-body p {
    font-size: 15px;
    line-height: 1.8;
    color: #c8d4e8;
    white-space: pre-wrap;
    word-break: break-word;
  }


  /* ── リアクションバー ── */
  .reaction-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .reaction-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text);
    font-family: var(--font);
    white-space: nowrap;
  }

  .reaction-btn:hover {
    border-color: var(--accent);
    background: rgba(79,158,255,0.06);
  }

  .reaction-btn.reacted {
    border-color: var(--accent);
    background: rgba(79,158,255,0.12);
    color: var(--accent);
  }

  .reaction-count {
    font-family: var(--mono);
    font-size: 11px;
    min-width: 12px;
    text-align: center;
  }

  /* リアクション追加 */
  .reaction-add-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
    font-family: var(--font);
  }

  .reaction-add-btn:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* 絵文字ピッカー */
  .emoji-picker {
    display: none;
    position: absolute;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    z-index: 50;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-top: 4px;
  }

  .emoji-picker.open { display: flex; flex-wrap: wrap; gap: 4px; }

  .emoji-option {
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: background .1s;
    line-height: 1;
  }

  .emoji-option:hover { background: var(--border); }

  /* OP操作 */
  .op-actions {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .del-btn-op {
    font-size: 12px;
    color: var(--accent2);
    background: none;
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all .15s;
    display: none;
  }

  .del-btn-op:hover {
    background: rgba(255,107,107,0.1);
    border-color: var(--accent2);
  }

  /* ── 返信リスト ── */
  .replies-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    animation: fadeUp .4s .15s ease both;
  }

  .replies-header h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .reply-count-badge {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }

  #replyList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .reply-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    animation: fadeUp .3s ease both;
    position: relative;
  }

  .reply-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .reply-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(79,158,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .reply-anon {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .reply-time {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-left: auto;
  }

  .reply-own-badge {
    font-size: 10px;
    background: rgba(80,227,164,0.15);
    color: var(--accent3);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    display: none;
  }

  .reply-body {
    font-size: 14px;
    line-height: 1.7;
    color: #c8d4e8;
    white-space: pre-wrap;
    word-break: break-word;
  }


  /* 返信カードのリアクション */
  .reply-reaction-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
    align-items: center;
    position: relative;
  }

  .reply-reaction-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text);
    font-family: var(--font);
  }

  .reply-reaction-btn:hover { border-color: var(--accent); }
  .reply-reaction-btn.reacted { border-color: var(--accent); background: rgba(79,158,255,0.1); color: var(--accent); }

  .reply-reaction-add {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 16px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
    font-family: var(--font);
  }

  .reply-reaction-add:hover { border-color: var(--muted); color: var(--text); }

  /* 返信カードの削除 */
  .reply-del-btn {
    font-size: 11px;
    color: var(--accent2);
    background: none;
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all .15s;
    display: none;
    margin-left: auto;
  }

  .reply-del-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--accent2); }

  /* ── 返信フォーム（固定フッター） ── */
  .reply-form {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
  }

  .reply-form-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .reply-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .reply-textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    height: 44px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.5;
    transition: border-color .2s, height .1s;
  }

  .reply-textarea:focus { border-color: var(--accent); }

  .reply-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .img-attach-btn { display: none; }

  .reply-submit-btn {
    background: var(--accent);
    color: #000;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 0 16px;
    height: 36px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .reply-submit-btn:hover { background: #79b8ff; }
  .reply-submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }


  /* ── ユーティリティ ── */
  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 2px;
  }

  .empty-replies {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transition: transform .3s;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--accent2); color: var(--accent2); }
  #toast.success { border-color: var(--accent3); color: var(--accent3); }
</style>
</head>
<body>

<nav>
  <button class="back-btn" onclick="goBack()">← 戻る</button>
  <div class="nav-sep"></div>
  <span class="nav-thread-title" id="navTitle">読み込み中...</span>
  <span class="admin-badge" id="adminBadge">⚡ ADMIN</span>
</nav>

<main>
  <!-- OP投稿エリア -->
  <div class="op-card" id="opCard">
    <div class="loading-spinner">LOADING...</div>
  </div>

  <!-- 返信一覧 -->
  <div class="replies-header">
    <h2>💬 返信</h2>
    <span class="reply-count-badge" id="replyCountBadge">—</span>
  </div>

  <div id="replyList">
    <div class="loading-spinner">LOADING...</div>
  </div>
</main>

<!-- 返信フォーム（固定フッター） -->
<div class="reply-form">
  <div class="reply-form-inner">
    <div class="reply-input-row">
      <textarea class="reply-textarea" id="replyText" placeholder="返信を入力... (Shift+Enterで改行)" maxlength="1000" rows="1"
        oninput="autoResize(this)"></textarea>
      <div class="reply-actions">
        <button class="reply-submit-btn" id="replySubmitBtn" onclick="submitReply()">送信</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- 絵文字ピッカーテンプレート -->
<template id="emojiPickerTemplate">
  <div class="emoji-picker">
    👍 👎 ❤️ 😂 😮 😢 🔥 🎉 👀 💯 🤔 👏 🙌 ✨ 💀 🫡
  </div>
</template>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
import { getFirestore, collection, addDoc, doc,
         getDoc, onSnapshot, deleteDoc, updateDoc,
         query, orderBy, serverTimestamp,
         runTransaction, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

// ── Firebase設定 ──
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyA4AnsrIEVzkJizszevxZVZ2aKjl-0T_0k",
  authDomain:        "keiziban-6f0b2.firebaseapp.com",
  projectId:         "keiziban-6f0b2",
  storageBucket:     "keiziban-6f0b2.firebasestorage.app",
  messagingSenderId: "797473242773",
  appId:             "1:797473242773:web:0ca9fadf2147d51036659c"
};

// ★ 管理者パスワード: URLに ?admin=ここで設定したパスワード を付けると管理者モード
const ADMIN_PASSWORD = "kairos_admin_2026";
const NG_WORDS       = []; // NGワードを追加したい場合: ["ワード1", "ワード2"]

// 利用可能な絵文字リスト
const EMOJIS = ['👍','👎','❤️','😂','😮','😢','🔥','🎉','👀','💯','🤔','👏','🙌','✨','💀','🫡'];

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// ── URLパラメータ ──
const urlParams  = new URLSearchParams(window.location.search);
const THREAD_ID  = urlParams.get('id');
const isAdmin    = urlParams.get('admin') === ADMIN_PASSWORD;

if (!THREAD_ID) { window.location.href = 'board.html'; }

// ── セッションID ──
function getSessionId() {
  let id = localStorage.getItem('board_session_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('board_session_id', id); }
  return id;
}
const SESSION_ID = getSessionId();

// ── 管理者表示 ──
if (isAdmin) document.getElementById('adminBadge').style.display = 'inline';

// ── 利用規約チェック ──
if (!sessionStorage.getItem('tos_agreed')) {
  window.location.href = 'index.html';
}

// ── 戻るボタン ──
window.goBack = function() {
  const q = isAdmin ? `?admin=${ADMIN_PASSWORD}` : '';
  window.location.href = `board.html${q}`;
};

// ── OP投稿の読み込みと描画 ──
async function loadThread() {
  const threadRef  = doc(db, 'threads', THREAD_ID);
  const threadSnap = await getDoc(threadRef);

  if (!threadSnap.exists()) {
    document.getElementById('opCard').innerHTML = '<div class="loading-spinner" style="color:var(--accent2)">スレッドが見つかりません</div>';
    return;
  }

  const d       = threadSnap.data();
  const isOwner = d.sessionId === SESSION_ID;
  const time    = d.createdAt?.toDate
    ? d.createdAt.toDate().toLocaleString('ja-JP')
    : '---';

  document.getElementById('navTitle').textContent    = d.title;
  document.title = `${d.title} — クラス掲示板`;

  // リアクションデータ（reactions: { "👍": ["sessionId1", ...], ... }）
  const reactions = d.reactions || {};

  document.getElementById('opCard').innerHTML = `
    <div class="op-header">
      <div class="op-avatar">📌</div>
      <div class="op-meta">
        <div class="op-title">${escapeHtml(d.title)}</div>
        <div class="op-info">
          <span class="op-anon">匿名</span>
          <span class="op-time">${time}</span>
          ${isOwner ? '<span class="op-own-badge" style="display:inline">自分の投稿</span>' : ''}
        </div>
      </div>
    </div>
    ${d.body ? `<div class="op-body"><p>${escapeHtml(d.body)}</p></div>` : ''}
    <div class="reaction-bar" id="opReactionBar">
      ${buildReactionBtns(reactions, 'thread', THREAD_ID)}
    </div>
    ${isOwner || isAdmin ? `
    <div class="op-actions">
      <button class="del-btn-op" style="display:inline" onclick="deleteThread()">🗑 スレッドを削除</button>
    </div>` : ''}
  `;
}

// ── リアクションHTML生成 ──
function buildReactionBtns(reactions, targetType, targetId) {
  let html = '';
  for (const [emoji, voters] of Object.entries(reactions)) {
    if (!voters || voters.length === 0) continue;
    const reacted = voters.includes(SESSION_ID);
    html += `<button class="reaction-btn ${reacted ? 'reacted' : ''}"
      onclick="toggleReaction('${targetType}','${targetId}','${emoji}')">
      ${emoji} <span class="reaction-count">${voters.length}</span>
    </button>`;
  }
  html += `<div style="position:relative">
    <button class="reaction-add-btn" onclick="togglePicker(this, '${targetType}','${targetId}')">＋ 😊</button>
    <div class="emoji-picker" id="picker-${targetType}-${targetId}">
      ${EMOJIS.map(e => `<span class="emoji-option" onclick="addReaction('${targetType}','${targetId}','${e}',this.closest('.emoji-picker'))">${e}</span>`).join('')}
    </div>
  </div>`;
  return html;
}

// ── 絵文字ピッカー表示 ──
window.togglePicker = function(btn, targetType, targetId) {
  const picker = document.getElementById(`picker-${targetType}-${targetId}`);
  const isOpen = picker.classList.contains('open');
  // 他を全部閉じる
  document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) picker.classList.add('open');
};

// ピッカー外クリックで閉じる
document.addEventListener('click', (e) => {
  if (!e.target.closest('.emoji-picker') && !e.target.closest('.reaction-add-btn') && !e.target.closest('.reply-reaction-add')) {
    document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'));
  }
});

// ── リアクション追加（新規絵文字） ──
window.addReaction = async function(targetType, targetId, emoji, picker) {
  picker?.classList.remove('open');
  await toggleReaction(targetType, targetId, emoji);
};

// ── リアクションのトグル ──
window.toggleReaction = async function(targetType, targetId, emoji) {
  const colName = targetType === 'thread' ? 'threads' : `threads/${THREAD_ID}/replies`;
  const targetRef = doc(db, colName, targetId);

  await runTransaction(db, async (tx) => {
    const snap = await tx.get(targetRef);
    if (!snap.exists()) return;

    const reactions = snap.data().reactions || {};
    const voters    = reactions[emoji] || [];

    if (voters.includes(SESSION_ID)) {
      // 取り消し
      const updated = voters.filter(id => id !== SESSION_ID);
      tx.update(targetRef, { [`reactions.${emoji}`]: updated });
    } else {
      // 追加
      tx.update(targetRef, { [`reactions.${emoji}`]: [...voters, SESSION_ID] });
    }
  });
};

// ── スレッド削除 ──
window.deleteThread = async function() {
  if (!confirm('スレッドと全返信を削除しますか？')) return;
  await deleteDoc(doc(db, 'threads', THREAD_ID));
  showToast('スレッドを削除しました', 'success');
  setTimeout(() => goBack(), 1000);
};

// ── 返信リアルタイム購読 ──
function subscribeReplies() {
  const q = query(
    collection(db, 'threads', THREAD_ID, 'replies'),
    orderBy('createdAt', 'asc')
  );

  onSnapshot(q, snapshot => {
    const listEl = document.getElementById('replyList');
    document.getElementById('replyCountBadge').textContent = `${snapshot.size} 件`;

    if (snapshot.empty) {
      listEl.innerHTML = '<div class="empty-replies">まだ返信がありません。最初のコメントをしよう！</div>';
      return;
    }

    listEl.innerHTML = '';
    let num   = 1;
    let delay = 0;

    snapshot.forEach(docSnap => {
      const d       = docSnap.data();
      const id      = docSnap.id;
      const isOwner = d.sessionId === SESSION_ID;
      const time    = d.createdAt?.toDate
        ? d.createdAt.toDate().toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
        : '---';

      const reactions = d.reactions || {};

      const card = document.createElement('div');
      card.className = 'reply-card';
      card.style.animationDelay = `${delay}s`;

      card.innerHTML = `
        <div class="reply-header">
          <span class="reply-num">#${num}</span>
          <span class="reply-anon">匿名</span>
          ${isOwner ? '<span class="reply-own-badge" style="display:inline">自分</span>' : ''}
          <span class="reply-time">${time}</span>
          ${isOwner || isAdmin ? `<button class="reply-del-btn" style="display:inline" data-id="${id}">🗑</button>` : ''}
        </div>
        <div class="reply-body">${escapeHtml(d.body)}</div>
        <div class="reply-reaction-bar" id="rr-${id}" style="position:relative">
          ${buildReplyReactionBtns(reactions, id)}
        </div>
      `;

      // 削除ボタン
      const delBtn = card.querySelector('.reply-del-btn');
      if (delBtn) {
        delBtn.addEventListener('click', async () => {
          if (!confirm('この返信を削除しますか？')) return;
          await deleteDoc(doc(db, 'threads', THREAD_ID, 'replies', id));
          // replyCountをデクリメント
          const threadRef = doc(db, 'threads', THREAD_ID);
          const ts = await getDoc(threadRef);
          if (ts.exists()) {
            await updateDoc(threadRef, { replyCount: Math.max(0, (ts.data().replyCount || 1) - 1) });
          }
          showToast('削除しました', 'success');
        });
      }

      listEl.appendChild(card);
      num++;
      delay += 0.03;
    });
  });
}

// 返信用リアクションHTML（クラス名が少し違う）
function buildReplyReactionBtns(reactions, replyId) {
  let html = '';
  for (const [emoji, voters] of Object.entries(reactions)) {
    if (!voters || voters.length === 0) continue;
    const reacted = voters.includes(SESSION_ID);
    html += `<button class="reply-reaction-btn ${reacted ? 'reacted' : ''}"
      onclick="toggleReaction('replies/${replyId}','${replyId}','${emoji}')">
      ${emoji} <span style="font-family:var(--mono);font-size:11px">${voters.length}</span>
    </button>`;
  }
  html += `<div style="position:relative">
    <button class="reply-reaction-add" onclick="togglePicker(this,'replies/${replyId}','${replyId}')">＋</button>
    <div class="emoji-picker" id="picker-replies/${replyId}-${replyId}">
      ${EMOJIS.map(e => `<span class="emoji-option" onclick="addReactionReply('${replyId}','${e}',this.closest('.emoji-picker'))">${e}</span>`).join('')}
    </div>
  </div>`;
  return html;
}

// 返信リアクション専用（Firestoreのパスが違う）
window.addReactionReply = async function(replyId, emoji, picker) {
  picker?.classList.remove('open');
  const targetRef = doc(db, 'threads', THREAD_ID, 'replies', replyId);

  await runTransaction(db, async (tx) => {
    const snap = await tx.get(targetRef);
    if (!snap.exists()) return;
    const reactions = snap.data().reactions || {};
    const voters    = reactions[emoji] || [];
    if (voters.includes(SESSION_ID)) {
      tx.update(targetRef, { [`reactions.${emoji}`]: voters.filter(id => id !== SESSION_ID) });
    } else {
      tx.update(targetRef, { [`reactions.${emoji}`]: [...voters, SESSION_ID] });
    }
  });
};

// ── 返信送信 ──
window.submitReply = async function() {
  const textEl    = document.getElementById('replyText');
  const submitBtn = document.getElementById('replySubmitBtn');

  const body = textEl.value.trim();
  if (!body) { showToast('メッセージを入力してください', 'error'); return; }

  for (const word of NG_WORDS) {
    if (body.toLowerCase().includes(word.toLowerCase())) {
      showToast('禁止ワードが含まれています', 'error');
      return;
    }
  }

  submitBtn.disabled    = true;
  submitBtn.textContent = '...';

  try {
    await addDoc(collection(db, 'threads', THREAD_ID, 'replies'), {
      body,
      sessionId: SESSION_ID,
      reactions: {},
      createdAt: serverTimestamp()
    });

    // 親スレッドのreplyCountをインクリメント
    const threadRef = doc(db, 'threads', THREAD_ID);
    const ts = await getDoc(threadRef);
    if (ts.exists()) {
      await updateDoc(threadRef, { replyCount: (ts.data().replyCount || 0) + 1 });
    }

    textEl.value        = '';
    textEl.style.height = '44px';
    showToast('返信しました！', 'success');
  } catch (err) {
    console.error(err);
    showToast('送信に失敗しました', 'error');
  } finally {
    submitBtn.disabled    = false;
    submitBtn.textContent = '送信';
  }
};

// Enterで送信 (Shift+Enterは改行)
document.getElementById('replyText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitReply();
  }
});

// ── テキストエリア自動リサイズ ──
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── ユーティリティ ──
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function showToast(msg, type = '') {
  const el      = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}

// ── 初期化 ──
await loadThread();
subscribeReplies();

// OPリアクションをリアルタイム更新
onSnapshot(doc(db, 'threads', THREAD_ID), (snap) => {
  if (!snap.exists()) return;
  const reactions = snap.data().reactions || {};
  const bar = document.getElementById('opReactionBar');
  if (bar) bar.innerHTML = buildReactionBtns(reactions, 'thread', THREAD_ID);
});

</script>
